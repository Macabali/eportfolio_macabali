<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Romer Macabali</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--aizen);
            padding: 15px 0;
            color: var(--ulquiorra);
            margin-bottom: 30px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-bottom: 1px solid var(--ichigo);
        }

        label {
            color: var(--ichigo);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <img src="assets/images/logo.png" alt="RMDEV">
        </div>
        <div class="nav-links">
            <a href="main.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main class="container" style="padding: 160px 10% 80px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 100px;">
            <section>
                <p style="color: var(--ichigo); font-weight: 600; letter-spacing: 2px; margin-bottom: 10px;">GET IN TOUCH</p>
                <h1 style="font-size: 3.5rem; margin-bottom: 30px;">Let's Talk.</h1>
                <p style="font-size: 1.2rem; color: var(--grimmjow); margin-bottom: 50px;">
                    Have a project in mind or just want to say hi? Feel free to reach out. I'm always open to discussing new opportunities.
                </p>

                <div style="display: flex; flex-direction: column; gap: 30px;">
                    <div>
                        <p style="color: var(--ichigo); font-weight: 700; font-size: 0.8rem;">EMAIL</p>
                        <p style="font-size: 1.2rem;">romermacabali000@gmail.com</p>
                    </div>
                    <div>
                        <p style="color: var(--ichigo); font-weight: 700; font-size: 0.8rem;">PHONE</p>
                        <p style="font-size: 1.2rem;">09082335030</p>
                    </div>
                    <div>
                        <p style="color: var(--ichigo); font-weight: 700; font-size: 0.8rem;">LOCATION</p>
                        <p style="font-size: 1.2rem;">San Fernando, Pampanga, Philippines</p>
                    </div>
                </div>
            </section>

            <section>
                <form id="contact-form">
                    <div>
                        <label>Your Name</label>
                        <input type="text" required>
                    </div>
                    <div>
                        <label>Email Address</label>
                        <input type="email" required>
                    </div>
                    <div>
                        <label>Message</label>
                        <textarea rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; border: none; cursor: pointer;">
                        Send Message
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
